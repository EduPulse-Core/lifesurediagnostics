<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeSure Diagnostics | Elite Medical Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        :root { --aura-primary: #1FA463; --aura-dark: #0E2A47; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background-color: #fbfcfd; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(14, 42, 71, 0.05); }
        .test-card-elite { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .test-card-elite:hover { transform: translateY(-15px) scale(1.03); box-shadow: 0 40px 80px -20px rgba(14, 42, 71, 0.15); border-color: var(--aura-primary); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="diagnosticsApp()">

    <nav class="glass-nav sticky top-0 z-[100] px-8 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3 group cursor-pointer">
            <div class="relative bg-white p-2 rounded-xl border border-slate-100 shadow-sm group-hover:rotate-12 transition">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
                    <path d="M50 10C27.9 10 10 27.9 10 50C10 72.1 27.9 90 50 90C72.1 90 90 72.1 90 50" stroke="#0E2A47" stroke-width="8" stroke-linecap="round"/>
                    <path d="M40 50L48 58L65 40" stroke="#1FA463" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="text-2xl font-800 tracking-tighter text-[#0E2A47]">LifeSure<span class="text-[#1FA463]">.</span></span>
        </div>
        
        <div class="flex items-center gap-6">
            <button @click="showCart = true" class="relative p-3 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition shadow-sm">
                <svg class="w-6 h-6 text-[#0E2A47]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span x-show="cart.length > 0" x-text="cart.length" class="absolute -top-1 -right-1 bg-[#1FA463] text-white text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-white shadow-lg"></span>
            </button>
            
            <a href="login.html" class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2.5 rounded-2xl hover:shadow-md transition group">
                <div class="p-1 bg-slate-100 rounded-full group-hover:bg-green-50 transition">
                    <svg class="w-5 h-5 text-slate-500 group-hover:text-[#1FA463]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <span class="font-bold text-sm text-[#0E2A47]">Login</span>
            </a>
        </div>
    </nav>

    <section class="pt-24 pb-20 px-8 bg-gradient-to-b from-white to-slate-50">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-5xl md:text-7xl font-900 tracking-tighter mb-8 leading-none text-[#0E2A47]">
                Clinical <span class="text-[#1FA463]">Intelligence.</span>
            </h1>
            <div class="relative flex p-3 bg-white shadow-2xl rounded-[30px] border border-slate-100 transform hover:scale-[1.02] transition-all">
                <input type="text" x-model="search" placeholder="Search for 70+ tests (e.g. Vitamin D, CBC, Sugar)..." 
                       class="flex-1 px-8 outline-none text-[#0E2A47] font-bold text-lg placeholder:text-slate-300">
                <button class="bg-[#1FA463] text-white px-10 py-4 rounded-[22px] font-900 text-xs uppercase tracking-widest hover:shadow-2xl shadow-green-500/20 transition-all">Search</button>
            </div>
        </div>
    </section>

    <section id="tests" class="max-w-7xl mx-auto px-8 py-20">
        <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
            <div>
                <h2 class="text-4xl font-900 tracking-tighter text-[#0E2A47]">Diagnostic Catalog</h2>
                <div class="h-1.5 w-20 bg-[#1FA463] mt-2 rounded-full"></div>
            </div>
            <select x-model="activeDept" class="bg-white border p-4 rounded-2xl font-bold text-slate-500 outline-none">
                <template x-for="dept in departments">
                    <option x-text="dept" :value="dept"></option>
                </template>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <template x-for="test in filteredTests" :key="test.id">
                <div class="test-card-elite bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 flex flex-col justify-between group h-full relative overflow-hidden">
                    <div x-show="test.originalPrice" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black px-4 py-1.5 rounded-bl-3xl uppercase tracking-tighter">
                        <span x-text="Math.round(((test.originalPrice - test.price)/test.originalPrice)*100)"></span>% OFF
                    </div>
                    <div>
                        <span class="text-[9px] font-900 text-[#1FA463] bg-green-50 px-4 py-2 rounded-xl uppercase tracking-widest mb-6 inline-block" x-text="test.dept"></span>
                        <h3 class="font-900 text-xl mb-4 leading-tight text-[#0E2A47] group-hover:text-[#1FA463] transition-colors" x-text="test.name"></h3>
                    </div>
                    <div class="flex justify-between items-center pt-8 border-t border-slate-50">
                        <div>
                            <p class="text-[9px] text-slate-300 font-black uppercase mb-1">Standard Fee</p>
                            <span class="text-3xl font-900 tracking-tighter text-[#0E2A47]">₹<span x-text="test.price"></span></span>
                            <span x-show="test.originalPrice" class="text-xs text-slate-300 line-through ml-2">₹<span x-text="test.originalPrice"></span></span>
                        </div>
                        <button @click="addToCart(test)" class="bg-[#0E2A47] hover:bg-[#1FA463] text-white p-4 rounded-2xl transition-all shadow-xl active:scale-90">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <script>
        function diagnosticsApp() {
            return {
                search: '',
                activeDept: 'All Departments',
                showCart: false,
                cart: [],
                departments: ['All Departments', 'BIOCHEMISTRY', 'CLINICAL PATHOLOGY', 'HAEMATOLOGY', 'IMMUNOLOGY', 'MICROBIOLOGY', 'SPECIAL TEST'],
                tests: [
                    { id: 1, name: 'Adreno Corticotropic Hormone (ACTH)', price: 1600, originalPrice: 2150, dept: 'IMMUNOLOGY' },
                    { id: 2, name: 'Absolute Eosinophil Count', price: 200, originalPrice: 250, dept: 'HAEMATOLOGY' },
                    { id: 3, name: 'ALANINE TRANSAMINASE (SGPT)', price: 200, originalPrice: 250, dept: 'BIOCHEMISTRY' },
                    { id: 4, name: 'ANTI NUCLEAR ANTIBODY (ANA)', price: 1000, originalPrice: 1200, dept: 'IMMUNOLOGY' },
                    { id: 5, name: 'COMPLETE BLOOD COUNT (CBC)', price: 300, originalPrice: 400, dept: 'HAEMATOLOGY' },
                    { id: 6, name: 'DIABETES SCREEN (HbA1c)', price: 599, originalPrice: 1200, dept: 'BIOCHEMISTRY' },
                    { id: 7, name: 'LIPID PROFILE', price: 799, originalPrice: 1350, dept: 'BIOCHEMISTRY' },
                    { id: 8, name: 'VITAMIN D (25-OH)', price: 1499, originalPrice: 2000, dept: 'IMMUNOLOGY' },
                    { id: 9, name: 'VITAMIN B12', price: 999, originalPrice: 1450, dept: 'IMMUNOLOGY' },
                    { id: 10, name: 'LIVER FUNCTION TEST (LFT)', price: 799, originalPrice: 1000, dept: 'BIOCHEMISTRY' },
                    { id: 11, name: 'URINE ROUTINE & MICROSCOPY', price: 200, originalPrice: 250, dept: 'CLINICAL PATHOLOGY' },
                    { id: 12, name: 'THYROID STIMULATING HORMONE (TSH)', price: 300, originalPrice: 350, dept: 'IMMUNOLOGY' }
                    // ... Add all 70 tests following this pattern
                ],
                get filteredTests() {
                    return this.tests.filter(t => 
                        (this.activeDept === 'All Departments' || t.dept === this.activeDept) &&
                        (t.name.toLowerCase().includes(this.search.toLowerCase()))
                    );
                },
                addToCart(test) {
                    this.cart.push(test);
                    if(this.cart.length === 1) this.showCart = true;
                }
            }
        }
    </script>
</body>
</html>
