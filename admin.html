<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeSure OS | Super-Advanced Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --aura-primary: #1FA463; --aura-dark: #0E2A47; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        .aura-sidebar { background: linear-gradient(195deg, #0E2A47 0%, #051626 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .nav-active { background: rgba(31, 164, 99, 0.15); color: #1FA463; border-right: 4px solid #1FA463; box-shadow: inset -10px 0 20px rgba(31, 164, 99, 0.05); }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-aura { animation: toastIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #1FA463; }
        input:checked + .slider:before { transform: translateX(22px); }
        .pulse-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body x-data="auraOS()">

    <div class="fixed top-8 right-8 z-[2000] space-y-4">
        <template x-for="note in notifications" :key="note.id">
            <div class="glass-panel p-6 rounded-[30px] shadow-2xl border-l-8 border-[#1FA463] toast-aura flex items-center gap-4 min-w-[320px]">
                <div class="bg-green-100 p-2 rounded-full text-[#1FA463]">⚡</div>
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 leading-none mb-1">OS Sync Active</p>
                    <p class="font-bold text-[#0E2A47] text-sm" x-text="note.msg"></p>
                </div>
            </div>
        </template>
    </div>

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 z-[1000] aura-sidebar flex items-center justify-center p-6">
            <div class="glass-panel p-12 rounded-[60px] shadow-2xl w-full max-w-md text-center">
                <div class="mb-8 inline-flex bg-[#1FA463]/10 p-6 rounded-[30px] text-[#1FA463] shadow-inner animate-pulse">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-4xl font-900 mb-2 text-[#0E2A47] tracking-tighter">Aura Security</h2>
                <input type="password" x-model="tempKey" placeholder="Access Code" class="w-full p-6 bg-white/50 rounded-[30px] mb-6 text-center text-2xl font-black tracking-[0.6em] focus:ring-4 focus:ring-[#1FA463]/20 transition outline-none border border-white">
                <button @click="authenticate()" class="w-full bg-[#1FA463] text-white py-6 rounded-[30px] font-800 text-lg shadow-2xl hover:scale-105 transition-all">Verify Protocol</button>
            </div>
        </div>
    </template>

    <div x-show="isLoggedIn" x-cloak class="min-h-screen flex flex-col md:flex-row">
        
        <aside class="w-full md:w-80 aura-sidebar text-white p-10 flex flex-col justify-between sticky top-0 h-screen overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-4 mb-20 px-4">
                    <div class="bg-[#1FA463] p-3 rounded-2xl shadow-xl shadow-green-500/20 rotate-3">⚡</div>
                    <span class="text-2xl font-900 tracking-tighter uppercase">LifeSure</span>
                </div>
                <nav class="space-y-3">
                    <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'nav-active' : 'text-slate-400'" class="w-full flex items-center gap-4 p-5 rounded-2xl font-800 transition-all text-left">📊 Analytics</button>
                    <button @click="view = 'reports'" :class="view === 'reports' ? 'nav-active' : 'text-slate-400'" class="w-full flex items-center gap-4 p-5 rounded-2xl font-800 transition-all text-left relative">
                        📜 Report Hub
                        <span x-show="pendingCount > 0" class="absolute right-4 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full" x-text="pendingCount"></span>
                    </button>
                    <button @click="view = 'tests'" :class="view === 'tests' ? 'nav-active' : 'text-slate-400'" class="w-full flex items-center gap-4 p-5 rounded-2xl font-800 transition-all text-left">🧪 Test Matrix</button>
                    <button @click="view = 'marketing'" :class="view === 'marketing' ? 'nav-active' : 'text-slate-400'" class="w-full flex items-center gap-4 p-5 rounded-2xl font-800 transition-all text-left">🚀 Growth Hub</button>
                </nav>
            </div>
            <button @click="logout()" class="mx-4 text-red-400 font-900 text-[10px] uppercase tracking-widest flex items-center gap-3 p-5 rounded-2xl hover:bg-red-500/10 transition">Log Out Protocol</button>
        </aside>

        <main class="flex-1 p-8 md:p-16 overflow-y-auto">
            
            <header class="flex justify-between items-center mb-16 animate-in fade-in slide-in-from-top-4 duration-700">
                <div>
                    <h1 class="text-5xl font-900 tracking-tighter text-[#0E2A47]" x-text="viewNames[view]"></h1>
                    <p class="text-slate-400 font-black text-[10px] uppercase tracking-[0.4em] mt-3">Node: <span class="text-[#1FA463]">Mumbai Central</span></p>
                </div>
                <div class="glass-panel p-3 pr-8 rounded-full shadow-sm flex items-center gap-4 border border-white">
                    <div class="w-12 h-12 bg-[#0E2A47] rounded-full flex items-center justify-center text-white font-black text-xs shadow-lg">AK</div>
                    <div>
                        <p class="text-[11px] font-black text-[#0E2A47] uppercase leading-none">Ayush Dubey</p>
                        <p class="text-[9px] font-bold text-[#1FA463] uppercase tracking-widest mt-1">Managed by Master</p>
                    </div>
                </div>
            </header>

            <div x-show="view === 'dashboard'" class="space-y-12 animate-in fade-in slide-in-from-bottom-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="glass-panel p-10 rounded-[50px] shadow-sm relative overflow-hidden group">
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mb-4">Total Patients</p>
                        <h2 class="text-6xl font-900 text-[#0E2A47]" x-text="patients.length"></h2>
                    </div>
                    <div class="glass-panel p-10 rounded-[50px] shadow-sm relative overflow-hidden border-orange-100 border-2">
                        <p class="text-orange-400 text-[10px] font-black uppercase tracking-[0.4em] mb-4">Pending Reports</p>
                        <h2 class="text-6xl font-900 text-[#0E2A47] pulse-pending" x-text="pendingCount"></h2>
                    </div>
                    <div class="bg-[#1FA463] p-10 rounded-[50px] shadow-2xl text-white relative overflow-hidden group">
                        <p class="text-green-100 text-[10px] font-black uppercase tracking-[0.4em] mb-4">Issued Reports</p>
                        <h2 class="text-6xl font-900" x-text="issuedCount"></h2>
                    </div>
                </div>
                
                <div class="bg-[#0E2A47] p-12 rounded-[60px] text-white relative overflow-hidden">
                    <p class="text-[10px] font-black uppercase tracking-[0.5em] mb-4 opacity-50">Consolidated Profit Matrix</p>
                    <h2 class="text-8xl font-900 tracking-tighter italic text-[#1FA463]">₹<span x-text="totalProfit()"></span></h2>
                    <p class="mt-6 text-xs font-bold text-slate-400 uppercase tracking-widest">Calculated after manual cost deductions</p>
                </div>
            </div>

            <div x-show="view === 'reports'" class="space-y-12 animate-in fade-in slide-in-from-bottom-6">
                <div class="glass-panel rounded-[50px] overflow-hidden shadow-sm border border-white">
                    <div class="p-10 border-b flex justify-between items-center">
                        <h3 class="text-2xl font-900 text-[#0E2A47] tracking-tighter">Medical Vault Dispatch</h3>
                        <div class="flex gap-4">
                            <span class="bg-orange-50 text-orange-500 text-[10px] font-black px-4 py-2 rounded-full uppercase" x-text="pendingCount + ' Waiting'"></span>
                            <span class="bg-green-50 text-green-500 text-[10px] font-black px-4 py-2 rounded-full uppercase" x-text="issuedCount + ' Verified'"></span>
                        </div>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50">
                            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">
                                <th class="p-10">Patient ID / Name</th>
                                <th class="p-10">Diagnostic Matrix</th>
                                <th class="p-10">Status</th>
                                <th class="p-10 text-right">Vault Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(p, index) in patients" :key="p.id">
                                <tr class="border-t border-slate-100 hover:bg-white transition-all group">
                                    <td class="p-10">
                                        <p class="font-900 text-[#0E2A47] text-xl tracking-tighter" x-text="p.name"></p>
                                        <p class="text-[10px] font-black text-slate-400 mt-2 uppercase" x-text="p.id"></p>
                                    </td>
                                    <td class="p-10">
                                        <span class="text-xs font-black text-slate-500 px-5 py-2 bg-slate-50 rounded-full" x-text="p.test"></span>
                                    </td>
                                    <td class="p-10">
                                        <template x-if="p.reportIssued">
                                            <span class="text-green-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293l-4 4a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L9 10.586l3.293-3.293a1 1 0 011.414 1.414z"></path></svg>
                                                Verified & Issued
                                            </span>
                                        </template>
                                        <template x-if="!p.reportIssued">
                                            <span class="text-orange-400 font-black text-[10px] uppercase tracking-widest pulse-pending">Awaiting PDF</span>
                                        </template>
                                    </td>
                                    <td class="p-10 text-right">
                                        <template x-if="!p.reportIssued">
                                            <button @click="triggerUpload(p)" class="bg-[#0E2A47] text-white px-8 py-4 rounded-[25px] font-black text-xs uppercase tracking-widest hover:scale-110 hover:bg-[#1FA463] transition-all shadow-xl">Upload PDF</button>
                                        </template>
                                        <template x-if="p.reportIssued">
                                            <button class="bg-slate-100 text-slate-400 px-8 py-4 rounded-[25px] font-black text-xs uppercase tracking-widest cursor-not-allowed">Published</button>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            </main>
    </div>

    <script>
        function auraOS() {
            return {
                isLoggedIn: false,
                tempKey: '',
                masterCode: '17102009',
                role: '', 
                view: 'dashboard',
                notifications: [],
                viewNames: { 'dashboard': 'Operational Analytics', 'reports': 'Medical Dispatch Engine', 'tests': 'Test Management', 'marketing': 'Growth Hub' },
                patients: [
                    { id: 'LS-2026-001', name: 'Rahul Sharma', test: 'Full Body Matrix', amount: 2999, cost: 1200, reportIssued: false },
                    { id: 'LS-2026-002', name: 'Anjali V.', test: 'Thyroid Profile', amount: 650, cost: 250, reportIssued: true },
                    { id: 'LS-2026-003', name: 'Vikram Mehta', test: 'Diabetes HbA1c', amount: 550, cost: 200, reportIssued: false }
                ],
                get pendingCount() { return this.patients.filter(p => !p.reportIssued).length; },
                get issuedCount() { return this.patients.filter(p => p.reportIssued).length; },
                
                authenticate() {
                    if(this.tempKey === this.masterCode) {
                        this.isLoggedIn = true;
                        this.role = 'MASTER';
                        this.tempKey = '';
                        this.pushNotify("Identity Verified. Master Command Online.");
                    } else { alert('OS Security: Access Protocol Denied'); }
                },
                totalProfit() {
                    return this.patients.reduce((total, p) => total + (p.amount - p.cost), 0);
                },
                triggerUpload(p) {
                    // This simulates the file selection and upload process
                    this.pushNotify(`Syncing Medical Record for ${p.name}...`);
                    setTimeout(() => {
                        p.reportIssued = true;
                        this.pushNotify(`Report published to ${p.name}'s secure vault.`);
                    }, 2000);
                },
                pushNotify(msg) {
                    const id = Date.now();
                    this.notifications.push({ id, msg });
                    setTimeout(() => this.notifications = this.notifications.filter(n => n.id !== id), 4000);
                },
                logout() { window.location.reload(); }
            }
        }
    </script>
</body>
</html>
