<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeSure Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Poppins;
background:#f5f7fb;
}

/* RGB glow border */

.rgb-card{
background:white;
border-radius:16px;
padding:20px;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.rgb-card:hover{
transform:translateY(-5px);
}

.rgb-card::before{
content:'';
position:absolute;
inset:-2px;
background:linear-gradient(45deg,#00ffd0,#00aaff,#8b5cf6,#ff00cc);
z-index:-1;
filter:blur(12px);
opacity:.35;
}

/* Sidebar */

.sidebar{
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* RGB Button */

.rgb-btn{
background:linear-gradient(45deg,#00ffd0,#00aaff,#8b5cf6);
color:white;
font-weight:600;
padding:10px 20px;
border-radius:10px;
transition:0.3s;
}

.rgb-btn:hover{
transform:scale(1.05);
}

/* Scrollbar */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#ccc;
border-radius:10px;
}

</style>

</head>

<body class="flex">

<!-- Sidebar -->

<div class="sidebar w-64 min-h-screen p-6 hidden md:block">

<div class="flex items-center gap-3 mb-10">

<img src="logo.png" class="w-10">

<h1 class="text-xl font-bold text-green-600">

LifeSure

</h1>

</div>

<ul class="space-y-4 font-medium">

<li class="text-green-600">Dashboard</li>
<li>Generate Report</li>
<li>Patients</li>
<li>Reports</li>
<li>Test Database</li>
<li>Revenue</li>
<li>Expenses</li>
<li>Profit Analytics</li>
<li>Settings</li>

</ul>

</div>

<!-- Main -->

<div class="flex-1 p-6">

<!-- Header -->

<div class="flex justify-between items-center mb-6">

<h2 class="text-2xl font-bold">

Dashboard

</h2>

<div class="flex items-center gap-4">

<button class="rgb-btn">

AI Assistant

</button>

<img src="https://i.pravatar.cc/40" class="rounded-full">

</div>

</div>

<!-- Stats -->

<div class="grid md:grid-cols-4 gap-6 mb-6">

<div class="rgb-card">

<p class="text-gray-500">Today's Patients</p>
<h2 class="text-3xl font-bold">18</h2>

</div>

<div class="rgb-card">

<p class="text-gray-500">Revenue</p>
<h2 class="text-3xl font-bold text-green-600">₹6,250</h2>

</div>

<div class="rgb-card">

<p class="text-gray-500">Profit</p>
<h2 class="text-3xl font-bold text-blue-600">₹4,100</h2>

</div>

<div class="rgb-card">

<p class="text-gray-500">Pending Reports</p>
<h2 class="text-3xl font-bold text-red-500">3</h2>

</div>

</div>

<!-- Charts -->

<div class="grid md:grid-cols-2 gap-6 mb-6">

<div class="rgb-card">

<h3 class="font-semibold mb-4">Earnings Overview</h3>

<canvas id="earningsChart"></canvas>

</div>

<div class="rgb-card">

<h3 class="font-semibold mb-4">Patients Growth</h3>

<canvas id="patientsChart"></canvas>

</div>

</div>

<!-- AI Panel -->

<div class="rgb-card">

<h3 class="font-semibold mb-4">

AI Assistant

</h3>

<input
type="text"
placeholder="Ask AI: Generate CBC report for Rahul"
class="border w-full p-3 rounded-lg mb-4">

<button class="rgb-btn w-full">

Ask AI

</button>

</div>

</div>

<script>

/* Earnings Chart */

new Chart(document.getElementById('earningsChart'),{

type:'line',

data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],

datasets:[{

label:'Revenue',

data:[1200,2100,1800,3000,2500,4000,6250],

borderColor:'#00aaff',

backgroundColor:'rgba(0,170,255,0.2)',

tension:0.4,

fill:true

}]

},

options:{
plugins:{legend:{display:false}}
}

})


/* Patients Chart */

new Chart(document.getElementById('patientsChart'),{

type:'bar',

data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],

datasets:[{

label:'Patients',

data:[5,8,7,10,9,12,18],

backgroundColor:'#00ffd0'

}]

},

options:{
plugins:{legend:{display:false}}
}

})

</script>

</body>
</html>
