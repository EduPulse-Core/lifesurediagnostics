<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeSure Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:Poppins;
background:#f5f7fb;
}

/* RGB Glow Cards */

.rgb-card{
background:white;
border-radius:16px;
padding:20px;
position:relative;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.rgb-card::before{
content:'';
position:absolute;
inset:-2px;
background:linear-gradient(45deg,#00ffcc,#00aaff,#8b5cf6,#ff00cc);
z-index:-1;
filter:blur(10px);
opacity:.3;
}

/* Sidebar */

.sidebar{
background:white;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

/* RGB Button */

.rgb-btn{
background:linear-gradient(45deg,#00ffcc,#00aaff,#8b5cf6);
color:white;
font-weight:600;
padding:10px 20px;
border-radius:10px;
transition:.3s;
}

.rgb-btn:hover{
transform:scale(1.05);
}

</style>

</head>

<body class="flex">

<!-- Sidebar -->

<div class="sidebar w-64 min-h-screen p-6 hidden md:block">

<h1 class="text-2xl font-bold text-green-600 mb-10">

LifeSure Admin

</h1>

<ul class="space-y-4 font-medium">

<li class="text-green-600">Dashboard</li>
<li>Generate Report</li>
<li>Patients</li>
<li>Reports</li>
<li>Test Database</li>
<li>Revenue</li>
<li>Expenses</li>
<li>Profit Analytics</li>
<li>Settings</li>

</ul>

</div>

<!-- Main Content -->

<div class="flex-1 p-6">

<!-- Header -->

<div class="flex justify-between items-center mb-6">

<h2 class="text-2xl font-bold">

Dashboard

</h2>

<div class="flex gap-4 items-center">

<button class="rgb-btn">

AI Assistant

</button>

<img src="https://i.pravatar.cc/40" class="rounded-full">

</div>

</div>

<!-- Stats Cards -->

<div class="grid md:grid-cols-4 gap-6 mb-6">

<div class="rgb-card">

<h3 class="text-gray-500">Today's Patients</h3>

<p class="text-3xl font-bold">18</p>

</div>

<div class="rgb-card">

<h3 class="text-gray-500">Revenue</h3>

<p class="text-3xl font-bold text-green-600">₹6,250</p>

</div>

<div class="rgb-card">

<h3 class="text-gray-500">Profit</h3>

<p class="text-3xl font-bold text-blue-600">₹4,100</p>

</div>

<div class="rgb-card">

<h3 class="text-gray-500">Pending Reports</h3>

<p class="text-3xl font-bold text-red-500">3</p>

</div>

</div>

<!-- Earnings Graph Area -->

<div class="rgb-card mb-6">

<h3 class="font-semibold mb-4">

Earnings Overview

</h3>

<div class="h-40 flex items-center justify-center text-gray-400">

Graph will appear here

</div>

</div>

<!-- AI Assistant Panel -->

<div class="rgb-card">

<h3 class="font-semibold mb-4">

AI Assistant

</h3>

<input
type="text"
placeholder="Ask AI to generate report..."
class="border p-3 w-full rounded-lg mb-3">

<button class="rgb-btn w-full">

Ask AI

</button>

</div>

</div>

</body>
</html>
