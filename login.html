<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeSure Gateway | Secure Clinical Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --aura-primary: #1FA463; --aura-dark: #0E2A47; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .aura-bg { 
            background: radial-gradient(circle at top right, #1FA463 0%, #0E2A47 100%); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
        }
        [x-cloak] { display: none !important; }
        
        /* Smooth Component Transitions */
        .form-enter { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: translateY(20px); }
        .form-enter-active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="aura-bg">

    <div class="glass-panel w-full max-w-2xl rounded-[60px] p-8 md:p-16 shadow-[0_50px_100px_-20px_rgba(14,42,71,0.5)] relative overflow-hidden" 
         x-data="auraAuth()" x-init="init()">
        
        <div class="text-center mb-10">
            <div class="inline-flex bg-green-50 p-5 rounded-[35px] text-[#1FA463] mb-6 shadow-inner ring-8 ring-green-50/50">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-900 tracking-tighter text-[#0E2A47] mb-2" x-text="mode === 'login' ? 'Access Health Vault' : 'New Patient Setup'"></h1>
            <div class="flex items-center justify-center gap-4">
                <span class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">ISO 9001:2015</span>
                <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
                <span class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">NABL Ready</span>
            </div>
        </div>

        <div class="flex p-1.5 bg-slate-100 rounded-3xl mb-10">
            <button @click="mode = 'login'" :class="mode === 'login' ? 'bg-white shadow-md text-[#0E2A47]' : 'text-slate-500'" class="flex-1 py-3 rounded-2xl font-800 text-xs uppercase tracking-widest transition-all">Login</button>
            <button @click="mode = 'register'" :class="mode === 'register' ? 'bg-white shadow-md text-[#0E2A47]' : 'text-slate-500'" class="flex-1 py-3 rounded-2xl font-800 text-xs uppercase tracking-widest transition-all">Register</button>
        </div>

        <div class="space-y-6">
            
            <div x-show="mode === 'register'" x-transition:enter="form-enter" x-transition:enter-start="opacity-0 translate-y-4" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-4">Legal Patient Name</label>
                    <input type="text" x-model="regData.name" placeholder="As per Govt ID" class="w-full p-5 bg-slate-50 rounded-[25px] outline-none border-2 border-transparent focus:border-[#1FA463] font-bold text-sm">
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-4">Age</label>
                    <input type="number" x-model="regData.age" placeholder="YY" class="w-full p-5 bg-slate-50 rounded-[25px] outline-none border-2 border-transparent focus:border-[#1FA463] font-bold text-center">
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-4">Gender</label>
                    <select x-model="regData.gender" class="w-full p-5 bg-slate-50 rounded-[25px] outline-none border-2 border-transparent focus:border-[#1FA463] font-bold text-slate-500">
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-4">Home Collection Address</label>
                    <textarea x-model="regData.address" placeholder="Flat No, Building, Area, Landmark..." class="w-full p-6 bg-slate-50 rounded-[30px] outline-none border-2 border-transparent focus:border-[#1FA463] font-bold text-sm h-32 resize-none"></textarea>
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-4">Area Pincode</label>
                    <input type="number" x-model="regData.pincode" placeholder="Mumbai Pincode (e.g. 400005)" class="w-full p-5 bg-slate-50 rounded-[25px] outline-none border-2 border-transparent focus:border-[#1FA463] font-bold text-sm tracking-[0.2em]">
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-4">Registered Mobile</label>
                    <div class="relative">
                        <span class="absolute left-6 top-5 text-slate-400 font-black">+91</span>
                        <input type="tel" x-model="mobile" maxlength="10" placeholder="00000 00000" class="w-full pl-16 p-5 bg-slate-50 rounded-[25px] outline-none border-2 border-transparent focus:border-[#1FA463] font-bold text-lg tracking-widest">
                    </div>
                </div>

                <button @click="executeAuth()" class="w-full bg-[#1FA463] text-white py-6 rounded-[30px] font-900 text-xs uppercase tracking-[0.4em] shadow-2xl hover:scale-[1.02] transition-all active:scale-95 flex items-center justify-center gap-4 group">
                    <span x-text="mode === 'login' ? 'Decrypt Vault' : 'Initialize Profile'"></span>
                    <svg class="w-5 h-5 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
            </div>

            <div class="pt-8 text-center flex flex-col gap-4">
                <div class="flex items-center justify-center gap-3 grayscale opacity-40">
                    <span class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full font-black text-[8px]">SSL</span>
                    <span class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full font-black text-[8px]">GDPR</span>
                    <span class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full font-black text-[8px]">HIPAA</span>
                </div>
                <p class="text-[9px] font-black text-slate-300 uppercase tracking-[0.5em]">Powered by AK Master Systems</p>
            </div>
        </div>

        <div class="absolute -bottom-20 -right-20 w-60 h-60 bg-green-50 rounded-full -z-10 blur-3xl"></div>
    </div>

    <script>
        function auraAuth() {
            return {
                mode: 'login',
                mobile: '',
                regData: { name: '', age: '', gender: '', address: '', pincode: '' },
                
                init() {
                    // Pre-check for existing session
                    if(localStorage.getItem('aura_logged_in') === 'true') {
                        // Optional auto-redirect
                    }
                },

                executeAuth() {
                    if (this.mobile.length !== 10) return alert("System Alert: Invalid Mobile Node");
                    
                    if (this.mode === 'register' && (!this.regData.name || !this.regData.address)) {
                        return alert("System Alert: Incomplete Patient Profile");
                    }

                    // PHASE 2 Simulation
                    this.pushToDatabase();
                },

                pushToDatabase() {
                    console.log("Syncing to Master OS...");
                    localStorage.setItem('aura_logged_in', 'true');
                    localStorage.setItem('patient_profile', JSON.stringify({
                        name: this.regData.name,
                        mobile: this.mobile,
                        address: this.regData.address
                    }));
                    
                    alert("Verification Link Sent to Node +91" + this.mobile);
                    window.location.href = 'index.html';
                }
            }
        }
    </script>
</body>
</html>
